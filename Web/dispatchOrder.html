<!doctype html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Dispatch Order Entry</title>
        <link rel="stylesheet" href="../CSS/dispatchOrder.css?v=6">
    </head>

    <body>

        <div class="container">

            <!-- ── Page Header ── -->
            <header class="page-header">
                <h1>Logistic and Dispatch Management System</h1>
                <h2>Dispatch Order Transaction Entry</h2>
            </header>

            <main class="form-wrap">
                <form id="dispatch-order-form" class="dispatch-form">

                    <!-- ══ ROW 1 : Order ID  |  Dispatch Date ══ -->
                    <div class="form-row">

                        <!-- Order ID (Find / New toggle) -->
                        <div class="form-group">
                            <label for="order-id" class="field-label">
                                Order ID : <span class="required">*</span>
                            </label>
                            <div class="field-col">
                                <div class="field-inline">
                                    <input type="number" id="order-id"
                                           class="field-input" style="width:120px;" />
                                    <div class="btn-group-inline">
                                        <div class="mode-toggle" id="mode-toggle">
                                            <input type="radio" name="form-mode"
                                                   id="mode-find" value="find" checked />
                                            <label for="mode-find">Find</label>
                                            <input type="radio" name="form-mode"
                                                   id="mode-new" value="new" />
                                            <label for="mode-new">New</label>
                                            <span class="slider"></span>
                                        </div>
                                    </div>
                                </div>
                                <div class="id-alert" id="id-alert" style="display:none;"></div>
                            </div>
                        </div>

                        <!-- Dispatch Date -->
                        <div class="form-group">
                            <label for="dispatch-date" class="field-label">
                                Dispatch Date : <span class="required">*</span>
                            </label>
                            <input type="date" id="dispatch-date" class="field-input date-input" />
                        </div>

                    </div><!-- /ROW 1 -->

                    <!-- ══ ROW 2 : Customer  |  Status ══ -->
                    <div class="form-row">

                        <!-- Customer LOV dropdown (search + table) -->
                        <div class="form-group">
                            <label for="customer-id-display" class="field-label">
                                Customer : <span class="required">*</span>
                            </label>
                            <div class="lov-container">
                                <input type="hidden" id="customer-id" />
                                <input type="text" id="customer-id-display"
                                       class="field-input field-select lov-input"
                                       placeholder="Select Customer" readonly />
                                <div class="lov-dropdown table-wide" id="customer-dropdown">
                                    <input type="text" class="lov-search"
                                           placeholder="Search by ID or Name..." />
                                    <table class="lov-table">
                                        <colgroup>
                                            <col style="width: 90px;" />
                                            <col />
                                        </colgroup>
                                        <thead>
                                            <tr>
                                                <th>Cust. ID</th>
                                                <th>Customer Name</th>
                                            </tr>
                                        </thead>
                                        <tbody id="customer-table-body"></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        <!-- Status (loaded from LOV table) -->
                        <div class="form-group">
                            <label for="status" class="field-label">Status :</label>
                            <select id="status" class="field-input field-select">
                                <option value="">Loading statuses...</option>
                            </select>
                        </div>

                    </div><!-- /ROW 2 -->

                    <!-- ══ ROW 3 : Source  |  Destination ══ -->
                    <div class="form-row">

                        <!-- Source -->
                        <div class="form-group">
                            <label for="source" class="field-label">
                                Source : <span class="required">*</span>
                                <button type="button" class="info-btn" id="source-info-btn"
                                    data-bs-toggle="tooltip" data-bs-placement="top"
                                    title="Enter the full pickup/origin address or location name for this dispatch.">i</button>
                            </label>
                            <textarea id="source" class="field-input textarea-field"></textarea>
                        </div>

                        <!-- Destination -->
                        <div class="form-group">
                            <label for="destination" class="field-label">
                                Destination : <span class="required">*</span>
                                <button type="button" class="info-btn" id="destination-info-btn"
                                    data-bs-toggle="tooltip" data-bs-placement="top"
                                    title="Enter the full delivery/drop-off address or location name for this dispatch.">i</button>
                            </label>
                            <textarea id="destination" class="field-input textarea-field"></textarea>
                        </div>

                    </div><!-- /ROW 3 -->

                </form>
            </main><!-- /form-wrap -->


            <!-- ══ Action Buttons ══ -->
            <div class="actions">

                <div class="btn-group-actions">
                    <button type="button" class="btn btn-save" id="save-btn">Save</button>
                    <button type="button" class="btn btn-update" id="update-btn">Update</button>
                </div>

                <div class="btn-group-nav">
                    <button type="button" class="btn btn-prev" id="previous-btn">◀ Previous</button>
                    <button type="button" class="btn btn-next" id="next-btn">Next ▶</button>
                </div>

                <div class="nav-end-msg" id="nav-end-msg" style="display:none;"></div>

                <a href="admin-dashboard.html" class="btn btn-exit" id="exit-btn">Exit</a>

            </div>

        </div><!-- /container -->

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="../JS/dispatchOrder.js?v=6"></script>
    </body>

</html>
