<!doctype html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Delivery Registration Form</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="../CSS/style.css">
    </head>

    <body>

        <div class="main-form border rounded-5 p-5 shadow-lg bg-white mx-auto mt-5">
            <div class="row m-0">
                <div class="col p-0">
                    <div class="d-flex justify-content-center mb-2">
                        <h1 class="main-text fw-bold text-white px-4 py-2 rounded-3 text-center fs-3">Logistic and Dispatch</h1>
                    </div>
                    <div class="d-flex justify-content-center mb-4">
                        <h4 class="main-text fw-bold text-white px-3 py-1 rounded-3 text-center fs-5">Delivery Entry Form</h4>
                    </div>

                    <form id="delivery-form">

                        <div class="mb-3 d-flex align-items-center text-nowrap gap-3">
                            <label for="delivery-id" class="form-label mb-0" style="width: 140px;">Delivery ID:</label>
                            <input type="number" class="form-control" id="delivery-id" style="width: 180px; max-width: 100%;" >
                            <button type="button" class="btn btn-outline-secondary btn-sm rounded-circle p-0 d-flex align-items-center justify-content-center" style="width: 30px; height: 30px;" data-bs-toggle="tooltip" title="Enter an existing Delivery ID only to update. Leave blank to register a new vehicle.">i</button>
                        </div>

                        <div class="mb-3 d-flex align-items-center text-nowrap gap-3">
                            <label for="order-id" class="form-label mb-0" style="width: 140px;">Order ID: <span class="text-danger">*</span></label>
                            <select class="form-select" id="order-id" style="width: 180px; max-width: 100%;"></select>
                        </div>

                        <div class="mb-3 d-flex align-items-center text-nowrap gap-3">
                            <label for="delivery-date" class="form-label mb-0" style="width: 140px;">Delivery Date: <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" id="delivery-date" style="width: 220px; max-width: 100%;">
                        </div>

                        <div class="mb-3 d-flex align-items-start text-nowrap gap-3">
                            <label for="remarks" class="form-label pt-1 mb-0" style="width: 140px;">Remarks:</label>
                            <textarea class="form-control" id="remarks" rows="3" style="width: 400px; max-width: 100%;"></textarea>
                        </div>

                        <div class="mb-4 d-flex align-items-center text-nowrap gap-3">
                            <label for="proof" class="form-label mb-0" style="width: 140px;">Proof of Delivery:</label>
                            <input type="text" class="form-control" id="proof" style="width: 400px; max-width: 100%;">
                        </div>

                        <div class="mb-3 d-flex justify-content-center mx-auto gap-3 pt-2">
                            <button type="button" class="btn btn-primary rounded-3 px-4" id="register-btn">Register</button>
                            <button type="button" class="btn btn-warning rounded-3 px-4 d-none" id="update-btn">Update</button>
                            <button type="button" class="btn bg-outline-dark bg-dark-subtle text-dark rounded-3 px-4" id="clear-btn">Clear</button>
                            <a href="admin-dashboard.html" class="btn bg-danger-subtle text-danger border border-danger-subtle rounded-3 px-4">Exit</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="../JS/delivery.js"></script>
    </body>

</html>
