<!doctype html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Customer Registration Form</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="../CSS/style.css">
    </head>

    <body>

        <div class="main-form border rounded-5 p-5 shadow-lg bg-white mx-auto mt-5">
            <div class="row m-0">
                <div class="col p-0">
                    <div class="d-flex justify-content-center mb-2">
                        <h1 class="main-text fw-bold text-white px-4 py-2 rounded-3 text-center fs-3">Logistic and Dispatch</h1>
                    </div>
                    <div class="d-flex justify-content-center mb-4">
                        <h4 class="main-text fw-bold text-white px-3 py-1 rounded-3 text-center fs-5">Customer Master Entry</h4>
                    </div>

                    <div class="row login-toggle border rounded-pill p-1 mx-auto mb-4 justify-content-center">
                        <div class="col p-0"><button type="button" id="toggle-register" class="btn slider rounded-pill w-100 active">Register</button></div>
                        <div class="col p-0"><button type="button" id="toggle-update" class="btn slider rounded-pill w-100">Update</button></div>
                    </div>

                    <form id="customer-form">

                        <div id="fetch-id" class="d-flex align-items-center text-nowrap gap-3 mb-3 d-none">
                            <label for="id" class="form-label mb-0" style="width: 100px;">Customer ID: <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="id" style="width: 120px;">
                            <button type="button" class="btn btn-outline-primary rounded-3" id="fetch-btn">Fetch</button>
                        </div>

                        <div class="mb-3 d-flex align-items-center text-nowrap gap-3">
                            <label for="name" class="form-label mb-0" style="width: 100px;">Full Name: <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="name" style="width: 400px; max-width: 100%;">
                        </div>
                        <div class="mb-3 d-flex align-items-start text-nowrap gap-3">
                            <label for="address" class="form-label pt-1 mb-0" style="width: 100px;">Address:</label>
                            <textarea class="form-control" id="address" rows="3" style="width: 400px; max-width: 100%;"></textarea>
                        </div>
                        <div class="mb-4 d-flex align-items-center text-nowrap gap-3">
                            <label for="phone" class="form-label mb-0" style="width: 100px;">Phone: <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="phone" style="width: 180px; max-width: 100%;">
                        </div>

                        <div class="mb-3 d-flex justify-content-center mx-auto gap-3 pt-2">
                            <button type="button" class="btn btn-primary rounded-3 px-4" id="register-btn">Register</button>
                            <button type="button" class="btn btn-warning rounded-3 px-4 d-none" id="update-btn">Update</button>

                            <div id="prev-next" class="d-none gap-2">
                                <button type="button" class="btn btn-success rounded-3 d-inline-flex align-items-center gap-1" id="previous-btn">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-step-back"><path d="M13.971 4.285A2 2 0 0 1 17 6v12a2 2 0 0 1-3.029 1.715l-9.997-5.998a2 2 0 0 1-.003-3.432z"/><path d="M21 20V4"/></svg>
                                    <span>Previous</span>
                                </button>
                                <button type="button" class="btn btn-success rounded-3 d-inline-flex align-items-center gap-1" id="next-btn">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-step-forward"><path d="M10.029 4.285A2 2 0 0 0 7 6v12a2 2 0 0 0 3.029 1.715l9.997-5.998a2 2 0 0 0 .003-3.432z"/><path d="M3 4v16"/></svg>
                                    <span>Next</span>
                                </button>
                            </div>

                            <button type="button" class="btn btn-outline-dark rounded-3 px-4" id="clear-btn">Clear</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="../JS/customer.js"></script>
    </body>

</html>
