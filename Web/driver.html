<!doctype html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Driver Registration Form</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../CSS/vehicle.css?v=2">
    </head>

    <body>

        <div class="container">
            <header class="page-header">
                <h1>Logistic and Dispatch Management System</h1>
                <h2>Driver Master Entry</h2>
            </header>

            <main class="form-wrap">
                <form id="driver-form" class="driver-form">
                    <div class="row">
                        <label for="driver-id" class="field-label">Driver ID : <span class="required">*</span></label>
                        <div class="field-col">
                            <div class="field-inline">
                                <input type="number" id="driver-id" class="field-input small" style="width: 150px;" />
                                <div class="btn-group-inline">
                                    <div class="mode-toggle" id="mode-toggle">
                                        <input type="radio" name="form-mode" id="mode-find" value="find" checked />
                                        <label for="mode-find">Find</label>
                                        <input type="radio" name="form-mode" id="mode-new" value="new" />
                                        <label for="mode-new">New</label>
                                        <span class="slider"></span>
                                    </div>
                                    <button type="button" class="info-btn" id="mode-info-btn" title="Find: enter ID to search. New: start a fresh entry.">i</button>
                                </div>
                            </div>
                            <!-- Inline alert shown when ID is not found (Find mode) -->
                            <div class="id-alert" id="id-alert" style="display:none;"></div>
                        </div>
                    </div>

                    <div class="row">
                        <label for="driver-name" class="field-label">Full Name :<span class="required">*</span></label>
                        <div class="field-inline">
                            <input type="text" id="driver-name" class="field-input large" style="width: 200px;" />
                        </div>
                    </div>

                     <div class="row">
                        <label for="driver-phone" class="field-label">Phone :<span class="required">*</span></label>
                        <div class="field-inline">
                            <input type="text" id="driver-phone" class="field-input large" style="width: 200px;" />
                        </div>
                    </div>

                    

                    <div class="row">
                        <label for="license" class="field-label">Licence-Number</label>
                        <div class="field-inline">
                            <input type="license" id="license" class="field-input medium" style="width: 150px;" />
                        </div>
                    </div>

                    
                </form>
            </main>

            <!-- ── Action Buttons ── -->
            <div class="row actions">
                <!-- Save / Update on the left group -->
                <div class="btn-group-actions">
                    <button type="button" class="btn btn-save" id="save-btn">
                        <span class="btn-icon"></span> Save
                    </button>
                    <button type="button" class="btn btn-update" id="update-btn">
                         Update
                    </button>
                </div>

                <!-- Navigation group: Previous + Next together -->
                <div class="btn-group-nav">
                    <button type="button" class="btn btn-prev" id="previous-btn">
                        ◀ Previous
                    </button>
                    <button type="button" class="btn btn-next" id="next-btn">
                        Next ▶
                    </button>
                </div>

                <!-- Navigation end-of-list message -->
                <div class="nav-end-msg" id="nav-end-msg" style="display:none;"></div>

                <!-- Exit -->
                <a href="admin-dashboard.html" class="btn btn-exit" id="exit-btn"> Exit</a>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="../JS/driver.js?v=2"></script>
    </body>

</html>
