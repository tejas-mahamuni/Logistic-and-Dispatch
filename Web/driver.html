<!doctype html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Driver Registration Form</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

        <link rel="stylesheet" href="../CSS/style.css">
    </head>

    <body>

        <div class="container col-11 col-sm-8 col-md-6 col-lg-4 col-xl-4 border rounded-5 p-5 shadow-lg bg-white mt-5">
            <div class="row">
                <div class="col">
                    <div class="d-flex justify-content-center mb-3">
                        <h4 class="fw-bolder">Driver Management</h4>
                    </div>

                    <div class="row login-toggle border rounded-pill p-1 w-75 mx-auto mb-4 justify-content-center">
                        <div class="col p-0"><button type="button" id="toggle-register"
                                class="btn slider rounded-pill w-100 active">Register</button></div>
                        <div class="col p-0"><button type="button" id="toggle-update"
                                class="btn slider rounded-pill w-100">Update</button></div>
                        <div class="col p-0"><button type="button" id="toggle-delete"
                                class="btn slider rounded-pill w-100">Delete</button></div>
                    </div>

                    <form id="driver-form">

                        <div class="row mb-3 d-none" id="fetch-id">
                            <div class="col">
                                <label for="id" class="form-label">Driver ID</label>
                                <div class="d-flex gap-5">
                                    <input type="number" class="form-control" id="id">
                                    <button type="button" class="btn btn-dark rounded-3" id="fetch-btn">Fetch</button>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="driver-name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="driver-name">
                        </div>
                        <div class="mb-3">
                            <label for="driver-phone" class="form-label">Phone</label>
                            <input type="text" class="form-control" id="driver-phone">
                        </div>
                        <div class="mb-3">
                            <label for="license" class="form-label">License Number</label>
                            <input type="text" class="form-control" id="license">
                        </div>

                        <div class="row mb-3 d-flex justify-content-evenly gap-2">
                            <button type="button" class="col-3 btn btn-primary rounded-pill"
                                id="register-btn">Register</button>
                            <button type="button" class="col-3 btn btn-warning rounded-pill d-none" id="update-btn">Update</button>
                            <button type="button" class="col-3 btn btn-danger rounded-pill d-none" id="delete-btn">Delete</button>
                            <button type="button" class="col-3 btn btn-outline-dark rounded-pill"
                                id="clear-btn">Clear</button>
                        </div>
                    </form>
                </div>

            </div>

        </div>


        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>

        <script src="../JS/driver.js"></script>
    </body>

</html>
