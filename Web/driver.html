<!doctype html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Driver Master Entry</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <style>
            body {
                background-color: #f9f9f9;
                font-family: Arial, Helvetica, sans-serif;
                margin: 0;
                padding: 0;
                overflow: hidden;
            }

            .main-form {
                width: 90vw;
                height: 90vh; /* Keeps the inner container bounded safely inside the viewport */
                display: flex;
                flex-direction: column;
                justify-content: center; /* Centers items cleanly inside the box layout vertically */
                align-items: center;
            }

            .h1{
                font-size: 30px;
            }

            .main-text {
                background-color: #5b2e8a;
            }

            .div-form {
                font-size: 17px;
            }

            .form-label {
                font-weight: bold;
            }

            .toggle-container {
                padding: 2px;
                border-radius: 30px;
                display: inline-flex;
                overflow: hidden;
                background-color: #fff;
            }

            .toggle-btn {
                border: none;
                background: none;
                padding: 6px 24px;
                font-weight: bold;
                color: #5b2e8a;
                cursor: pointer;
                transition: all 0.2s ease;
            }

            .toggle-btn.active {
                background-color: #5b2e8a;
                color: #fff;
            }

            .form-control:disabled {
                background-color: #e9ecef !important;
                cursor: not-allowed !important;
                opacity: 0.8;
            }

            #fetch-id-wrapper {
                position: relative;
                margin-bottom: 2.5rem !important;
            }

            /* Custom red alert banner border exactly matching the layout rules */
            .custom-alert-box {
                position: absolute;
                top: 100%;
                left: 155px;
                z-index: 10;
                border: 1px solid #f5c2c7 !important;
                background-color: #f8d7da !important;
                color: #842029 !important;
                border-radius: 10px;
                padding: 4px 12px;
                font-weight: 500;
                font-size: 0.9rem;
                display: none;
                max-width: 350px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            }

            /* Hides up-down counter spin fields */
            input[type=number]::-webkit-inner-spin-button,
            input[type=number]::-webkit-outer-spin-button {
                -webkit-appearance: none;
                margin: 0;
            }

            input[type=number] {
                -moz-appearance: textfield;
            }
        </style>
    </head>

    <body class="bg-primary-subtle d-flex align-items-center justify-content-center vh-100">

        <div class="main-form border rounded-5 p-4 shadow-lg bg-white mx-auto">
            <div class="row m-0">
                <div class="col p-0">
                    <div class="d-flex justify-content-center mb-2">
                        <h1 class="main-text fw-bold text-white px-5 py-3 rounded-3 text-center fs-2 shadow-sm">Logistic and Dispatch Management System</h1>
                    </div>
                    <div class="d-flex justify-content-center mb-4">
                        <h4 class="main-text fw-bold text-white px-5 py-2 rounded-3 text-center fs-3 shadow-sm">Driver Master Entry</h4>
                    </div>

                    <form id="driver-form">
                        <div class="div-form mb-5 px-5 py-4 rounded-5 shadow-lg" style="background-color: #F3EAF9;">

                            <div id="fetch-id-wrapper" class="d-flex flex-column mb-4">
                                <div id="fetch-id" class="d-flex align-items-center text-nowrap gap-3">
                                    <label for="id" class="form-label mb-0" style="width: 160px;">Driver ID: <span class="text-danger">*</span></label>
                                    <input type="number" class="form-control" id="id" style="width: 120px;">
                                    <div class="d-flex align-items-center">
                                        <div class="toggle-container border">
                                            <button type="button" id="toggle-find" class="toggle-btn rounded-pill active">Find</button>
                                            <button type="button" id="toggle-new" class="toggle-btn rounded-pill">New</button>
                                        </div>
                                    </div>
                                    <button type="button" class="btn btn-outline-secondary btn-sm rounded-circle p-0 d-flex align-items-center justify-content-center" style="width: 30px; height: 30px;" data-bs-toggle="tooltip" title="Input target ID or use the navigation dashboard.">i</button>
                                </div>
                                <div id="id-db-feedback" class="custom-alert-box mt-1"></div>
                            </div>

                            <div class="mb-4 d-flex align-items-center text-nowrap gap-3" style="margin-top: 25px;">
                                <label for="name" class="form-label mb-0" style="width: 160px;">Full Name: <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="name" style="width: 350px; max-width: 100%;">
                            </div>

                            <div class="mb-4 d-flex align-items-center text-nowrap gap-3">
                                <label for="phone" class="form-label mb-0" style="width: 160px;">Phone Number: <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="phone" style="width: 220px; max-width: 100%;">
                            </div>

                            <div class="mb-2 d-flex align-items-center text-nowrap gap-3">
                                <label for="license" class="form-label mb-0" style="width: 160px;">License Number: <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="license" style="width: 220px; max-width: 100%;">
                            </div>
                        </div>

                        <div class="mb-2 d-flex justify-content-center mx-auto gap-3 pt-2">
                            <button type="button" class="btn btn-warning rounded-3 px-4 fw-bold text-dark" id="action-btn">Update</button>

                            <div class="btn-group rounded-pill overflow-hidden border shadow-sm gap-1">
                                <button type="button" class="btn btn-primary text-white d-inline-flex align-items-center gap-2 px-4" id="previous-btn">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-step-back">
                                        <path d="M13.971 4.285A2 2 0 0 1 17 6v12a2 2 0 0 1-3.029 1.715l-9.997-5.998a2 2 0 0 1-.003-3.432z" />
                                        <path d="M21 20V4" />
                                    </svg>
                                    <span style="font-weight: bold;">Previous</span>
                                </button>
                                <button type="button" class="btn btn-primary text-white d-inline-flex align-items-center gap-2 px-4" id="next-btn">
                                    <span style="font-weight: bold;">Next</span>
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-step-forward">
                                        <path d="M10.029 4.285A2 2 0 0 0 7 6v12a2 2 0 0 0 3.029 1.715l9.997-5.998a2 2 0 0 0 .003-3.432z" />
                                        <path d="M3 4v16" />
                                    </svg>
                                </button>
                            </div>

                            <a href="admin-dashboard.html" class="btn bg-danger-subtle text-danger border border-danger-subtle rounded-3 px-4 d-flex align-items-center fw-bold">Exit</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="../JS/driver.js"></script>
    </body>

</html>
