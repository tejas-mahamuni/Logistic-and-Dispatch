<!doctype html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Vehicle Registration Form</title>
       
        <link rel="stylesheet" href="../CSS/vehicle.css?v=2">
    </head>

    <body>

        <div class="container">
            <header class="page-header">
                <h1>Logistic and Dispatch Management System</h1>
                <h2>Vehicle Master Entry</h2>
            </header>

            <main class="form-wrap">
                <form id="vehicle-form" class="vehicle-form">
                    <div class="row">
                        <label for="vehicle-id" class="field-label">Vehicle ID : <span class="required">*</span></label>
                        <div class="field-col">
                            <div class="field-inline">
                                <input type="number" id="vehicle-id" class="field-input small" style="width: 150px;" />
                                <div class="btn-group-inline">
                                    <div class="mode-toggle" id="mode-toggle">
                                        <input type="radio" name="form-mode" id="mode-find" value="find" checked />
                                        <label for="mode-find">Find</label>
                                        <input type="radio" name="form-mode" id="mode-new" value="new" />
                                        <label for="mode-new">New</label>
                                        <span class="slider"></span>
                                    </div>
                                    <button type="button" class="info-btn" id="mode-info-btn" title="Find: enter ID to search. New: start a fresh entry.">i</button>
                                </div>
                            </div>
                            <!-- Inline alert shown when ID is not found (Find mode) -->
                            <div class="id-alert" id="id-alert" style="display:none;"></div>
                        </div>
                    </div>

                    <div class="row">
                        <label for="vehicle-number" class="field-label">Vehicle Number :<span class="required">*</span></label>
                        <div class="field-inline">
                            <input type="text" id="vehicle-number" class="field-input large" style="width: 200px;" />
                        </div>
                    </div>

                    <div class="row">
                        <label for="vehicle-type" class="field-label">Vehicle Type :<span class="required">*</span></label>
                        
                        <div class="field-inline">
                            <select id="vehicle-type" class="field-input large" style="width: 200px;" >
                                <option value="">Loading vehicle types...</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <label for="capacity" class="field-label">Capacity :</label>
                        <div class="field-inline">
                            <input type="number" id="capacity" class="field-input medium" style="width: 150px;" />
                        </div>
                    </div>

                    
                </form>
            </main>

            <div class="row actions">
                <div class="btn-group-actions">
                    <button type="button" class="btn btn-save" id="save-btn">
                        <span class="btn-icon"></span> Save
                    </button>
                    <button type="button" class="btn btn-update" id="update-btn">
                         Update
                    </button>
                </div>

                <div class="btn-group-nav">
                    <button type="button" class="btn btn-prev" id="previous-btn">
                        ◀ Previous
                    </button>
                    <button type="button" class="btn btn-next" id="next-btn">
                        Next ▶
                    </button>
                </div>

                <div class="nav-end-msg" id="nav-end-msg" style="display:none;"></div>

                <a href="admin-dashboard.html" class="btn btn-exit" id="exit-btn"> Exit</a>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="../JS/vehicle.js?v=2"></script>
    </body>

</html>
