<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Vehicle Management</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


    </head>

    <body>

        <div class="container col-11 col-sm-8 col-md-6 col-lg-4 col-xl-4 border rounded-5 p-5 shadow-lg bg-white mt-5">
            <div class="row">
                <div class="col">
                    <div class="d-flex justify-content-center mb-3">
                        <h4 class="fw-bolder">Vehicle Management</h4>
                    </div>
                    <form id="vehicle-form">

                        <div class="row mb-3">
                            <div class="col">
                                <label for="id" class="form-label">Vehicle ID</label>
                                <div class="d-flex gap-5">
                                    <input type="number" class="form-control" id="vehicle-id">
                                    <button type="button" class="btn btn-dark rounded-3" id="fetch-btn">Fetch</button>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="vehicle-number" class="form-label">Vehicle Number</label>
                            <input type="text" class="form-control" id="vehicle-number">
                        </div>
                        <div class="mb-3">
                            <label for="vehicle-type" class="form-label">Vehicle Type</label>
                            <select id="vehicle-type" class="form-select" aria-label="Default select example">
                                <option value="">Select Vehicle Type</option>
                                <option>Truck</option>
                                <option>Mini Truck</option>
                                <option>Van</option>
                                <option>Container</option>
                                <option>Tempo</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label for="capacity" class="form-label">Capacity (kg)</label>
                            <input type="number" class="form-control" id="capacity">
                        </div>

                        <div class="row  mb-3 d-flex justify-content-evenly gap-2">
                            <button type="button" class="col btn btn-primary rounded-pill" id="save-btn">Register</button>
                            <button type="button" class="col btn btn-warning rounded-pill" id="update-btn">Update</button>
                            <button type="button" class="col btn btn-danger rounded-pill" id="delete-btn">Delete</button>
                            <button type="button" class="col btn btn-outline-dark rounded-pill" id="clear-btn">Clear</button>
                        </div>
                    </form>
                </div>

            </div>

        </div>


        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>

        <script src="../JS/vehicle.js"></script>

    </body>

</html>
