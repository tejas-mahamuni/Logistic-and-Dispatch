<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dispatch Assignment</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <style>
            body {
                background-color: #f9f9f9;
                font-family: Arial, Helvetica, sans-serif;
                overflow-y: hidden; 
            }

            .main-form {
                width: 90vw;
                height: 90vh; 
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .main-text {
                background-color: #5b2e8a;
            }

            .form-label {
                font-weight: bold;
            }

            .toggle-container {
                padding: 2px;
                border-radius: 30px;
                display: inline-flex;
                overflow: hidden;
                background-color: #fff;
            }

            .toggle-btn {
                border: none;
                background: none;
                padding: 6px 24px;
                font-weight: bold;
                color: #5b2e8a;
                cursor: pointer;
                transition: all 0.2s ease;
            }

            .toggle-btn.active {
                background-color: #5b2e8a;
                color: #fff;
            }

            .form-control:disabled, .lov-input:disabled {
                background-color: #e9ecef !important;
                cursor: not-allowed !important;
                opacity: 0.8;
            }

            #fetch-id-wrapper {
                position: relative;
                margin-bottom: 2.5rem !important;
            }

            .custom-alert-box {
                position: absolute;
                top: 100%; 
                left: 155px;
                z-index: 10; 
                border: 1px solid #f5c2c7 !important;
                background-color: #f8d7da !important;
                color: #842029 !important;
                border-radius: 10px;
                padding: 4px 12px;
                font-weight: 500;
                font-size: 0.9rem;
                display: none;
                max-width: 350px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            }

            /* Hides up-down counter spin fields */
            input[type=number]::-webkit-inner-spin-button, 
            input[type=number]::-webkit-outer-spin-button { 
                -webkit-appearance: none; 
                margin: 0; 
            }
            input[type=number] { -moz-appearance: textfield; }

            /* Search Dropdown Layout Overrides */
            .lov-container {
                position: relative;
                width: 250px;
            }
            .lov-input {
                background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23343a40' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
                background-repeat: no-repeat;
                background-position: right .75rem center;
                background-size: 16px 12px;
                cursor: pointer;
            }
            .lov-dropdown {
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                z-index: 100;
                background: white;
                border: 1px solid #ccc;
                border-radius: 8px;
                max-height: 220px;
                overflow-y: auto;
                display: none;
                box-shadow: 0 6px 12px rgba(0,0,0,0.15);
                padding: 8px;
            }
            .lov-dropdown.table-wide {
                width: 520px !important;
            }
            .lov-list-item {
                padding: 6px 12px;
                cursor: pointer;
                border-radius: 4px;
            }
            .lov-list-item:hover {
                background-color: #F3EAF9;
            }
            .lov-table-row {
                cursor: pointer;
            }
            .lov-table-row:hover {
                background-color: #F3EAF9 !important;
            }
        </style>
    </head>

    <body class="bg-primary-subtle d-flex align-items-center justify-content-center py-4" style="height: 100vh;">

        <div class="main-form border rounded-5 p-5 shadow-lg bg-white mx-auto">
            <div class="row m-0">
                <div class="col p-0">
                    <div class="d-flex justify-content-center mb-2">
                        <h1 class="main-text fw-bold text-white px-5 py-3 rounded-3 text-center fs-2 shadow-sm">Logistic and Dispatch Management System</h1>
                    </div>
                    <div class="d-flex justify-content-center mb-4">
                        <h4 class="main-text fw-bold text-white px-5 py-2 rounded-3 text-center fs-3 shadow-sm">Dispatch Assignment Entry</h4>
                    </div>

                    <form id="dispatch-assignment-form">
                        <div class="mb-5 px-5 py-4 rounded-5 shadow-lg" style="background-color: #F3EAF9;">

                            <div id="fetch-id-wrapper" class="d-flex flex-column mt-3 mb-5">
                                <div id="fetch-id" class="d-flex align-items-center text-nowrap gap-3">
                                    <label for="assignment-id" class="form-label mb-0" style="width: 140px;">Assignment ID: <span class="text-danger">*</span></label>
                                    <input type="number" class="form-control" id="assignment-id" style="width: 120px;">
                                    <div class="d-flex align-items-center">
                                        <div class="toggle-container border">
                                            <button type="button" id="toggle-find" class="toggle-btn rounded-pill active">Find</button>
                                            <button type="button" id="toggle-new" class="toggle-btn rounded-pill">New</button>
                                        </div>
                                    </div>
                                    <button type="button" class="btn btn-outline-secondary btn-sm rounded-circle p-0 d-flex align-items-center justify-content-center" style="width: 30px; height: 30px;" data-bs-toggle="tooltip" title="Input target ID or use navigation options.">i</button>
                                </div>
                                <div id="id-db-feedback" class="custom-alert-box mt-1"></div>
                            </div>

                            <div class="d-flex gap-5 mb-5" style="margin-top: 25px;">
                                <div class="d-flex align-items-center text-nowrap gap-3">
                                    <label class="form-label mb-0" style="width: 140px;">Order ID: <span class="text-danger">*</span></label>
                                    <div class="lov-container">
                                        <input type="text" class="form-control lov-input" id="order-id" placeholder="Select Order" readonly>
                                        <div class="lov-dropdown" id="order-dropdown">
                                            <input type="text" class="form-control form-control-sm mb-2 lov-search" placeholder="Search Order ID...">
                                            <div class="lov-list" id="order-list"></div>
                                        </div>
                                    </div>
                                </div>
                                <div class="d-flex align-items-center text-nowrap gap-3">
                                    <label for="date-time" class="form-label mb-0" style="width: 100px;">Date :</label>
                                    <input type="date" class="form-control" id="date-time" style="width: 200px; max-width: 100%;">
                                </div>
                            </div>
                            
                            <div class="d-flex gap-5 mb-4">
                                <div class="d-flex align-items-center text-nowrap gap-3">
                                    <label class="form-label mb-0" style="width: 140px;">Driver ID: <span class="text-danger">*</span></label>
                                    <div class="lov-container">
                                        <input type="text" class="form-control lov-input" id="driver-id" placeholder="Select Driver" readonly>
                                        <div class="lov-dropdown" id="driver-dropdown">
                                            <input type="text" class="form-control form-control-sm mb-2 lov-search" placeholder="Search Driver...">
                                            <div class="lov-list" id="driver-list"></div>
                                        </div>
                                    </div>
                                </div>

                                <div class="d-flex align-items-center text-nowrap gap-3">
                                    <label class="form-label mb-0" style="width: 100px;">Vehicle ID: <span class="text-danger">*</span></label>
                                    <div class="lov-container">
                                        <input type="text" class="form-control lov-input" id="vehicle-id" placeholder="Select Vehicle" readonly>
                                        <div class="lov-dropdown table-wide" id="vehicle-dropdown">
                                            <input type="text" class="form-control form-control-sm mb-2 lov-search" placeholder="Search by ID...">
                                            <table class="table table-sm table-bordered table-striped mt-1 rounded-3 overflow-hidden text-center small">
                                                <thead class="table-white">
                                                    <tr>
                                                        <th>ID</th>
                                                        <th>Vehicle Number</th>
                                                        <th>Type</th>
                                                        <th>Capacity</th>
                                                    </tr>
                                                </thead>
                                                <tbody id="vehicle-table-body"></tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mb-2 d-flex justify-content-center mx-auto gap-3 pt-2">
                            <button type="button" class="btn btn-warning rounded-3 px-4 fw-bold text-dark"
                                id="action-btn">Update</button>

                            <div class="btn-group rounded-pill overflow-hidden gap-1">
                                <button type="button"
                                    class="btn btn-primary text-white d-inline-flex align-items-center gap-2"
                                    id="previous-btn">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="18" viewBox="0 0 24 24"
                                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round" class="lucide lucide-step-back">
                                        <path
                                            d="M13.971 4.285A2 2 0 0 1 17 6v12a2 2 0 0 1-3.029 1.715l-9.997-5.998a2 2 0 0 1-.003-3.432z" />
                                        <path d="M21 20V4" />
                                    </svg>
                                    <span style="display: inline !important; font-weight: bold;">Previous</span>
                                </button>
                                <button type="button" class="btn btn-primary text-white d-inline-flex align-items-center gap-2 px-4"
                                    id="next-btn">
                                    <span style="display: inline !important; font-weight: bold;">Next</span>
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="18" viewBox="0 0 24 24"
                                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round" class="lucide lucide-step-forward">
                                        <path
                                            d="M10.029 4.285A2 2 0 0 0 7 6v12a2 2 0 0 0 3.029 1.715l9.997-5.998a2 2 0 0 0 .003-3.432z" />
                                        <path d="M3 4v16" />
                                    </svg>
                                </button>
                            </div>

                            <a href="admin-dashboard.html"
                                class="btn bg-danger-subtle text-danger border border-danger-subtle rounded-3 px-4 d-flex align-items-center fw-bold">Exit</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="../JS/DispatchAssignment.js"></script>
    </body>

</html>
