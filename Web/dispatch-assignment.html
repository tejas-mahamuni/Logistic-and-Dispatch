<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dispatch Assignment Entry</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <style>
            body {
                background-color: #f9f9f9;
                font-family: Arial, Helvetica, sans-serif;
                min-height: 100vh;
            }

            .main-form {
                width: 90vw;
                min-height: 90vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }

            .main-text {
                background-color: #5b2e8a;
            }

            /* ── Font sizes matched to dispatchOrder form ── */
            h1.main-text {
                font-size: 30px !important;
            }

            h4.main-text {
                font-size: 20px !important;
            }

            .form-label {
                font-weight: 700;
                font-size: 16px;
                color: #5b2e8a;
            }

            .div-form {
                font-size: 15px;
            }

            .form-control,
            .form-select,
            textarea.form-control {
                font-size: 15px;
                font-family: Arial, Helvetica, sans-serif;
                color: #1f2937;
            }

            .toggle-container {
                padding: 2px;
                border-radius: 30px;
                display: inline-flex;
                overflow: hidden;
                background-color: #fff;
            }

            .toggle-btn {
                border: none;
                background: none;
                padding: 6px 24px;
                font-weight: bold;
                color: #5b2e8a;
                cursor: pointer;
                transition: all 0.2s ease;
            }

            .toggle-btn.active {
                background-color: #5b2e8a;
                color: #fff;
            }

            .form-control:disabled,
            .lov-input:disabled {
                background-color: #e9ecef !important;
                cursor: not-allowed !important;
                opacity: 0.8;
            }

            #fetch-id-wrapper {
                position: relative;
                margin-bottom: 2.5rem !important;
            }

            .custom-alert-box {
                position: absolute;
                top: 100%;
                left: 155px;
                z-index: 10;
                border: 1px solid #f5c2c7 !important;
                background-color: #f8d7da !important;
                color: #842029 !important;
                border-radius: 10px;
                padding: 4px 12px;
                font-weight: 500;
                font-size: 0.9rem;
                display: none;
                max-width: 350px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            }

            /* Search Dropdown Layout Overrides */
            .lov-container {
                position: relative;
                width: 250px;
            }

            .lov-input {
                background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23343a40' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
                background-repeat: no-repeat;
                background-position: right .75rem center;
                background-size: 16px 12px;
                cursor: pointer;
            }

            .lov-dropdown {
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                z-index: 100;
                background: white;
                border: 1px solid #ccc;
                border-radius: 8px;
                max-height: 220px;
                overflow-y: auto;
                overflow-x: hidden;
                display: none;
                box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
                padding: 8px;
            }

            /* --- SPECIFIC WIDTH LAYOUT OVERRIDES --- */
            .lov-dropdown.order-table-wide {
                width: 800px !important;       /* Explicitly locked to 800px to show all columns natively */
                overflow-x: auto !important;
            }

            .lov-dropdown.vehicle-table-wide {
                width: 520px !important;       /* Restored to target required content dimension bounds */
                overflow-x: auto !important;
            }
            
            .lov-dropdown table {
                min-width: 100%;
                margin-bottom: 0;
            }

            .lov-table-row {
                cursor: pointer;
            }

            .lov-table-row:hover {
                background-color: #F3EAF9 !important;
            }

            /* ── Button colors matched to dispatchOrder form ── */
            #action-btn {
                background: linear-gradient(135deg, #d97706, #f59e0b) !important;
                color: #fff !important;
                border: none !important;
                border-radius: 24px !important;
                font-weight: 700 !important;
                font-size: 15px !important;
                padding: 11px 26px !important;
                box-shadow: 0 3px 10px rgba(0,0,0,0.12) !important;
                transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease !important;
            }
            #action-btn:hover { filter: brightness(1.08) !important; transform: translateY(-2px) !important; }

            #previous-btn {
                background: linear-gradient(135deg, #4f46e5, #6366f1) !important;
                color: #fff !important;
                border: none !important;
                border-right: 1px solid rgba(255,255,255,0.25) !important;
                border-radius: 24px 0 0 24px !important;
                font-weight: 700 !important;
                font-size: 15px !important;
                box-shadow: none !important;
                transition: filter 0.15s ease !important;
            }
            #previous-btn:hover { filter: brightness(1.1) !important; }

            #next-btn {
                background: linear-gradient(135deg, #0891b2, #22d3ee) !important;
                color: #fff !important;
                border: none !important;
                border-radius: 0 24px 24px 0 !important;
                font-weight: 700 !important;
                font-size: 15px !important;
                box-shadow: none !important;
                transition: filter 0.15s ease !important;
            }
            #next-btn:hover { filter: brightness(1.1) !important; }

            a.btn[href*="dashboard"] {
                background: linear-gradient(135deg, #dc2626, #f87171) !important;
                color: #fff !important;
                border: none !important;
                border-radius: 24px !important;
                font-weight: 700 !important;
                font-size: 15px !important;
                padding: 11px 26px !important;
                box-shadow: 0 3px 10px rgba(0,0,0,0.12) !important;
                transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease !important;
            }
            a.btn[href*="dashboard"]:hover { filter: brightness(1.08) !important; transform: translateY(-2px) !important; }
        </style>
    </head>

    <body class="bg-primary-subtle d-flex align-items-center justify-content-center">

        <div class="main-form border rounded-5 p-5 shadow-lg bg-white mx-auto">
            <div class="row m-0">
                <div class="col p-0">
                    <div class="d-flex justify-content-center mb-2">
                        <h1 class="main-text fw-bold text-white px-5 py-3 rounded-3 text-center fs-2 shadow-sm">Logistic and Dispatch Management System</h1>
                    </div>
                    <div class="d-flex justify-content-center mb-4">
                        <h4 class="main-text fw-bold text-white px-5 py-2 rounded-3 text-center fs-3 shadow-sm">Dispatch Assignment Entry</h4>
                    </div>

                    <form id="dispatch-assignment-form">
                        <div class="div-form mb-5 px-5 py-4 rounded-5 shadow-lg" style="background-color: #F3EAF9;">

                            <div id="fetch-id-wrapper" class="d-flex flex-column mt-3 mb-5">
                                <div id="fetch-id" class="d-flex align-items-center text-nowrap gap-3">
                                    <label for="assignment-id" class="form-label mb-0" style="width: 160px;">Assignment ID: <span class="text-danger">*</span></label>
                                    <input type="number" class="form-control" id="assignment-id" style="width: 120px;">
                                    <div class="d-flex align-items-center">
                                        <div class="toggle-container border">
                                            <button type="button" id="toggle-find" class="toggle-btn rounded-pill active">Find</button>
                                            <button type="button" id="toggle-new" class="toggle-btn rounded-pill">New</button>
                                        </div>
                                    </div>
                                    <button type="button" class="btn btn-outline-secondary btn-sm rounded-circle p-0 d-flex align-items-center justify-content-center" style="width: 30px; height: 30px;" data-bs-toggle="tooltip" title="Input target ID or use navigation options.">i</button>
                                </div>
                                <div id="id-db-feedback" class="custom-alert-box mt-1"></div>
                            </div>

                            <div class="d-flex gap-5 mb-5" style="margin-top: 25px;">
                                <div class="d-flex align-items-center text-nowrap gap-3">
                                    <label class="form-label mb-0" style="width: 160px;">Order ID: <span class="text-danger">*</span></label>
                                    <div class="lov-container">
                                        <input type="text" class="form-control lov-input" id="order-id" placeholder="Select Order" readonly>
                                        <div class="lov-dropdown order-table-wide" id="order-dropdown">
                                            <input type="text" class="form-control form-control-sm mb-2 lov-search" placeholder="Search orders by id, date, source, destination...">
                                            <table class="table table-sm table-bordered table-striped mt-1 rounded-3 text-center small">
                                                <thead class="table-dark">
                                                    <tr>
                                                        <th>Order ID</th>
                                                        <th>Cust. ID</th>
                                                        <th>Dispatch Date</th>
                                                        <th>Route (Source &rarr; Dest)</th>
                                                        <th>Status</th>
                                                    </tr>
                                                </thead>
                                                <tbody id="order-table-body"></tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                                <div class="d-flex align-items-center text-nowrap gap-3">
                                    <label for="date-time" class="form-label mb-0" style="width: 120px;">Date :</label>
                                    <input type="date" class="form-control" id="date-time" style="width: 200px; max-width: 100%;">
                                </div>
                            </div>
                            
                            <div class="d-flex gap-5 mb-4">
                                <div class="d-flex align-items-center text-nowrap gap-3">
                                    <label class="form-label mb-0" style="width: 160px;">Driver ID: <span class="text-danger">*</span></label>
                                    <div class="lov-container">
                                        <input type="text" class="form-control lov-input" id="driver-id" placeholder="Select Driver" readonly>
                                        <div class="lov-dropdown" id="driver-dropdown">
                                            <input type="text" class="form-control form-control-sm mb-2 lov-search" placeholder="Search Driver...">
                                            <table class="table table-sm table-bordered table-striped mt-1 rounded-3 overflow-hidden text-center small">
                                                <thead class="table-dark">
                                                    <tr>
                                                        <th>Driver ID</th>
                                                        <th>Driver Name</th>
                                                    </tr>
                                                </thead>
                                                <tbody id="driver-table-body"></tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>

                                <div class="d-flex align-items-center text-nowrap gap-3">
                                    <label class="form-label mb-0" style="width: 120px;">Vehicle ID: <span class="text-danger">*</span></label>
                                    <div class="lov-container">
                                        <input type="text" class="form-control lov-input" id="vehicle-id" placeholder="Select Vehicle" readonly>
                                        <div class="lov-dropdown vehicle-table-wide" id="vehicle-dropdown">
                                            <input type="text" class="form-control form-control-sm mb-2 lov-search" placeholder="Search Vehicle ID...">
                                            <table class="table table-sm table-bordered table-striped mt-1 rounded-3 overflow-hidden text-center small">
                                                <thead class="table-dark">
                                                    <tr>
                                                        <th>ID</th>
                                                        <th>Vehicle Number</th>
                                                        <th>Type</th>
                                                        <th>Capacity</th>
                                                    </tr>
                                                </thead>
                                                <tbody id="vehicle-table-body"></tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mb-2 d-flex justify-content-center mx-auto gap-3 pt-2">
                            <button type="button" class="btn btn-warning rounded-3 px-4 fw-bold text-dark" id="action-btn">Update</button>

                            <div class="btn-group rounded-pill overflow-hidden gap-1">
                                <button type="button" class="btn btn-primary text-white d-inline-flex align-items-center gap-2" id="previous-btn">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-step-back">
                                        <path d="M13.971 4.285A2 2 0 0 1 17 6v12a2 2 0 0 1-3.029 1.715l-9.997-5.998a2 2 0 0 1-.003-3.432z" />
                                        <path d="M21 20V4" />
                                    </svg>
                                    <span style="font-weight: bold;">Previous</span>
                                </button>
                                <button type="button" class="btn btn-primary text-white d-inline-flex align-items-center gap-2 px-4" id="next-btn">
                                    <span style="font-weight: bold;">Next</span>
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-step-forward">
                                        <path d="M10.029 4.285A2 2 0 0 0 7 6v12a2 2 0 0 0 3.029 1.715l9.997-5.998a2 2 0 0 0 .003-3.432z" />
                                        <path d="M3 4v16" />
                                    </svg>
                                </button>
                            </div>

                            <a href="admin-dashboard.html" class="btn bg-danger-subtle text-danger border border-danger-subtle rounded-3 px-4 d-flex align-items-center fw-bold">Exit</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="../JS/DispatchAssignment.js"></script>
    </body>

</html>
