<!doctype html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Logistic and Dispatch</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

        <link rel="stylesheet" href="../CSS/login.css">
    </head>

    <body>

        <div class="container bg-white col-sm-11 col-md-8 col-lg-4 col-xl-3 rounded-5 shadow-lg px-2 py-2">
            <div class="row mt-4 mb-4">
                <h4 class="d-flex justify-content-center fw-bolder">Logistic & Dispatch</h4>
            </div>

            <div class="row login-toggle border rounded-pill p-1 w-75 mx-auto mb-4 justify-content-center">
                <div class="col p-0"><button type="button" id="login"
                        class="btn slider rounded-pill w-100 active">Login</button></div>
                <div class="col p-0"><button type="button" id="register"
                        class="btn slider rounded-pill w-100">Register</button></div>
            </div>

            <form id="form-login" class="px-3">

                <div class="mb-4">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <div class="mb-4 d-flex mx-auto justify-content-center">
                    <button type="submit" class="btn rounded-pill btn-primary">Login</button>
                </div>

            </form>

            <form id="form-register" class="px-3 d-none">
                <div class="row mb-1">
                    <h4 class="d-flex justify-content-center">Register as</h4>
                </div>
                <div class="mb-4 d-flex mx-auto justify-content-center">
                    <a href="customer.html"
                        class="btn rounded-pill btn-outline-success w-50 text-decoration-none">Customer</a>
                </div>
                <div class="mb-4 d-flex mx-auto justify-content-center">
                    <a href="driver.html" class="btn rounded-pill btn-outline-primary w-50 text-decoration-none">Driver</a>
                </div>
                <div class="mb-4 d-flex mx-auto justify-content-center">
                    <a href="vehicle.html"
                        class="btn rounded-pill btn-outline-warning w-50 text-decoration-none">Vehicle</a>
                </div>
                <div class="mb-4 d-flex mx-auto justify-content-center">
                    <a href="delivery.html"
                        class="btn rounded-pill btn-outline-info w-50 text-decoration-none">Delivery</a>
                </div>
            </form>


        </div>


        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>

        <script src="../JS/login.js"></script>
    </body>

</html>
